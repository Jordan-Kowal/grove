name: Build and Release

on:
  release:
    types: [created]

jobs:
  quality:
    uses: ./.github/workflows/code-quality.yml

  build_and_release:
    needs: quality
    runs-on: macos-latest

    env:
      SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
      NOTARY_PROFILE: grove-notary

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Install Go tools
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          go install github.com/go-task/task/v3/cmd/task@latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Import signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo -n "$CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Store notarytool credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "grove-notary" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Build, sign, notarize, package DMG
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: task darwin:release VERSION="$TAG_NAME"

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/Grove-*.dmg
