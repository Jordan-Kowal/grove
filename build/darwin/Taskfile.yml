version: '3'

includes:
  common: ../Taskfile.yml

vars:
  # Code signing identity — override via SIGN_IDENTITY env var.
  # Format: "Developer ID Application: Your Name (TEAMID)"
  # Falls back to ad-hoc ("-") for local dev builds without a cert.
  SIGN_IDENTITY: '{{.SIGN_IDENTITY | default "-"}}'
  # Notarization keychain profile (stored via `xcrun notarytool store-credentials`).
  # Override via NOTARY_PROFILE env var.
  NOTARY_PROFILE: '{{.NOTARY_PROFILE | default "grove-notary"}}'

tasks:
  build:
    summary: Builds the application for macOS
    deps:
      - task: common:go:mod:tidy
      - task: common:build:frontend
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
          DEV:
            ref: .DEV
    cmds:
      - go build {{.BUILD_FLAGS}} -o {{.OUTPUT}}
    vars:
      BUILD_FLAGS: '{{if eq .DEV "true"}}-buildvcs=false -gcflags=all="-l"{{else}}-tags production -trimpath -buildvcs=false -ldflags="-w -s"{{end}}'
      DEFAULT_OUTPUT: '{{.BIN_DIR}}/{{.APP_NAME}}'
      OUTPUT: '{{ .OUTPUT | default .DEFAULT_OUTPUT }}'
    env:
      GOOS: darwin
      CGO_ENABLED: 1
      GOARCH: '{{.ARCH | default ARCH}}'
      CGO_CFLAGS: "-mmacosx-version-min=15.0"
      CGO_LDFLAGS: "-mmacosx-version-min=15.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"

  package:
    summary: Packages the application into a .app bundle
    deps:
      - task: build
    cmds:
      - task: create:app:bundle

  create:app:bundle:
    summary: Creates a .app bundle (signed ad-hoc by default; pass SIGN_IDENTITY for Developer ID)
    cmds:
      - mkdir -p "{{.BIN_DIR}}/{{.APP_NAME}}.app/Contents/MacOS"
      - mkdir -p "{{.BIN_DIR}}/{{.APP_NAME}}.app/Contents/Resources"
      - cp build/darwin/icons.icns "{{.BIN_DIR}}/{{.APP_NAME}}.app/Contents/Resources"
      - cp "{{.BIN_DIR}}/{{.APP_NAME}}" "{{.BIN_DIR}}/{{.APP_NAME}}.app/Contents/MacOS"
      - cp build/darwin/Info.plist "{{.BIN_DIR}}/{{.APP_NAME}}.app/Contents"
      - task: sign:app

  sign:app:
    summary: Signs the .app bundle with hardened runtime and entitlements
    cmds:
      - |
        codesign --force --deep --timestamp \
          --options runtime \
          --entitlements build/darwin/entitlements.plist \
          --sign "{{.SIGN_IDENTITY}}" \
          "{{.BIN_DIR}}/{{.APP_NAME}}.app"
      - codesign --verify --verbose "{{.BIN_DIR}}/{{.APP_NAME}}.app"

  notarize:app:
    summary: Submits the .app to Apple notary service and staples the ticket
    preconditions:
      - sh: test "{{.SIGN_IDENTITY}}" != "-"
        msg: "Cannot notarize ad-hoc signed app. Set SIGN_IDENTITY to a Developer ID."
    cmds:
      - ditto -c -k --keepParent "{{.BIN_DIR}}/{{.APP_NAME}}.app" "{{.BIN_DIR}}/{{.APP_NAME}}-notarize.zip"
      - xcrun notarytool submit "{{.BIN_DIR}}/{{.APP_NAME}}-notarize.zip" --keychain-profile "{{.NOTARY_PROFILE}}" --wait
      - xcrun stapler staple "{{.BIN_DIR}}/{{.APP_NAME}}.app"
      - rm "{{.BIN_DIR}}/{{.APP_NAME}}-notarize.zip"

  dmg:
    summary: Creates a signed .dmg with drag-to-Applications layout using hdiutil
    deps:
      - task: package
    cmds:
      - rm -f "{{.BIN_DIR}}/{{.APP_NAME}}-{{.VERSION}}.dmg"
      - rm -rf "{{.BIN_DIR}}/dmg-src"
      - mkdir -p "{{.BIN_DIR}}/dmg-src"
      - cp -R "{{.BIN_DIR}}/{{.APP_NAME}}.app" "{{.BIN_DIR}}/dmg-src/"
      - ln -s /Applications "{{.BIN_DIR}}/dmg-src/Applications"
      - |
        hdiutil create \
          -volname "{{.APP_NAME}}" \
          -srcfolder "{{.BIN_DIR}}/dmg-src" \
          -ov -format UDZO \
          "{{.BIN_DIR}}/{{.APP_NAME}}-{{.VERSION}}.dmg"
      - rm -rf "{{.BIN_DIR}}/dmg-src"
      - codesign --force --timestamp --sign "{{.SIGN_IDENTITY}}" "{{.BIN_DIR}}/{{.APP_NAME}}-{{.VERSION}}.dmg"
    vars:
      VERSION: '{{.VERSION | default "dev"}}'

  notarize:dmg:
    summary: Submits the .dmg to Apple notary service and staples the ticket
    preconditions:
      - sh: test "{{.SIGN_IDENTITY}}" != "-"
        msg: "Cannot notarize ad-hoc signed dmg. Set SIGN_IDENTITY to a Developer ID."
    cmds:
      - xcrun notarytool submit "{{.BIN_DIR}}/{{.APP_NAME}}-{{.VERSION}}.dmg" --keychain-profile "{{.NOTARY_PROFILE}}" --wait
      - xcrun stapler staple "{{.BIN_DIR}}/{{.APP_NAME}}-{{.VERSION}}.dmg"
    vars:
      VERSION: '{{.VERSION | default "dev"}}'

  release:
    summary: Full release flow — build, sign, notarize, dmg, notarize dmg
    cmds:
      - task: package
      - task: notarize:app
      - task: dmg
        vars:
          VERSION: '{{.VERSION}}'
      - task: notarize:dmg
        vars:
          VERSION: '{{.VERSION}}'
    vars:
      VERSION: '{{.VERSION | default "dev"}}'

  run:
    cmds:
      - mkdir -p "{{.BIN_DIR}}/{{.APP_NAME}}.dev.app/Contents/MacOS"
      - mkdir -p "{{.BIN_DIR}}/{{.APP_NAME}}.dev.app/Contents/Resources"
      - cp build/darwin/icons.icns "{{.BIN_DIR}}/{{.APP_NAME}}.dev.app/Contents/Resources"
      - cp "{{.BIN_DIR}}/{{.APP_NAME}}" "{{.BIN_DIR}}/{{.APP_NAME}}.dev.app/Contents/MacOS"
      - cp "build/darwin/Info.dev.plist" "{{.BIN_DIR}}/{{.APP_NAME}}.dev.app/Contents/Info.plist"
      - codesign --force --deep --sign - "{{.BIN_DIR}}/{{.APP_NAME}}.dev.app"
      - '{{.BIN_DIR}}/{{.APP_NAME}}.dev.app/Contents/MacOS/{{.APP_NAME}}'
