version: "3"

info:
  companyName: "Jordan Kowal"
  productName: "Grove"
  productIdentifier: "app.jkdev.grove"
  description: "Lightweight worktree dashboard"
  copyright: "(c) 2025-2026, Jordan Kowal"
  version: "0.2.0"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - bin
      - dist
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: wails3 task common:install:frontend:deps
      type: once
    - cmd: go mod tidy
      type: blocking
    - cmd: wails3 task common:generate:bindings
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task dev:build
      type: blocking
    - cmd: wails3 task run
      type: primary
