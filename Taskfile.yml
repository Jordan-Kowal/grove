version: '3'

dotenv: ['.env']

includes:
  common: ./build/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml

vars:
  APP_NAME: "Grove"
  BIN_DIR: "bin"
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "darwin:build"

  dev:build:
    summary: Builds the application for development (no production tag)
    cmds:
      - task: "darwin:build"
        vars:
          DEV: "true"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "darwin:package"

  run:
    summary: Runs the application
    cmds:
      - task: "darwin:run"

  release:local:
    summary: Builds a signed+notarized local release DMG (reads SIGN_IDENTITY + NOTARY_PROFILE from .env)
    preconditions:
      - sh: test -n "$SIGN_IDENTITY"
        msg: "SIGN_IDENTITY not set. Copy .env.example to .env."
      - sh: test -n "$NOTARY_PROFILE"
        msg: "NOTARY_PROFILE not set. Copy .env.example to .env."
    cmds:
      - task: "darwin:release"

  dev:
    summary: Runs the application in development mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  lint:
    summary: Runs all linters (biome, tsc, golangci-lint, CI pins)
    cmds:
      - bun run biome:check
      - bun run tsc
      - golangci-lint run
      - sh scripts/check-ci-pins.sh

  test:
    summary: Runs all tests
    env:
      CGO_LDFLAGS: "-mmacosx-version-min=15.4"
    cmds:
      - go test -race ./backend/...

  vuln:
    summary: Runs govulncheck against Go dependencies (version pinned in go.mod `tool` directive)
    # GOTELEMETRY=off defends against golang.org/x/telemetry ever flipping on
    # by default. Go's telemetry is opt-in today, but it ships transitively
    # with govulncheck, so pinning the intent here keeps the data boundary
    # explicit regardless of upstream defaults.
    env:
      GOTELEMETRY: "off"
    cmds:
      - go tool govulncheck ./backend/...

  check:
    summary: Runs all quality checks (lint + test + vuln)
    cmds:
      - task: lint
      - task: test
      - task: vuln

  upgrade:
    summary: Updates all dependencies to latest versions and runs checks
    cmds:
      - bunx npm-check-updates -u
      - bun install
      - go get -u ./...
      - go mod tidy
      - task: check

  version:bump:
    summary: Bumps the app version across all config files
    cmds:
      - sh scripts/bump-version.sh {{.CLI_ARGS}}

  generate:
    summary: Generates Wails TypeScript bindings from Go services
    cmds:
      - wails3 generate bindings -ts -d frontend/bindings

  clean:
    summary: Removes build artifacts
    cmds:
      - rm -rf dist bin
